<header class="navbar">
    <div class="container-main navbar-inner">

        <a href="{% url 'home' %}" class="logo">
            {% if site.logo %}
                <img src="{{ site.logo.url }}" alt="{{ site.company_name }}">
            {% else %}
                {{ site.company_name }}
            {% endif %}
        </a>

        <nav class="nav-links">
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'services' %}">Layanan</a>
            <a href="{% url 'gallery' %}">Galeri</a>
            <a href="{% url 'about' %}">Tentang</a>
            <a href="{% url 'contact' %}">Kontak</a>
        </nav>

        <a href="https://wa.me/{{ site.whatsapp_number }}" class="btn-whatsapp">
            Hubungi
        </a>

    </div>
</header>
