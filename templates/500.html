<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Terjadi Kesalahan Server</title>
    <style>
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background-color: #F8F7F4;
            color: #1C1C1C;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 24px;
            text-align: center;
        }
        .error-box {
            max-width: 480px;
        }
        .error-badge {
            display: inline-block;
            background-color: #E8A838;
            color: #1C1C1C;
            font-weight: 600;
            font-size: 13px;
            padding: 4px 12px;
            border-radius: 6px;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 12px;
        }
        p {
            color: #5A5A5A;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        a {
            display: inline-block;
            background-color: #E8A838;
            color: #1C1C1C;
            font-weight: 600;
            font-size: 15px;
            padding: 12px 28px;
            border-radius: 6px;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="error-box">

        <span class="error-badge">500</span>

        <h1>Terjadi Kesalahan Server</h1>

        <p>
            Maaf, terjadi gangguan teknis sementara di server kami.
            Silakan coba beberapa saat lagi.
        </p>

        <a href="/">Kembali ke Beranda</a>

    </div>

</body>
</html>
